<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#08101d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Актуальный список серверов STALZONE по регионам">
  <title>Stalzone serverlist</title>
  <link rel="stylesheet" href="./styles.css?v=6.2">
</head>
<body>
<div class="page-shell">
<div class="container">
  <header class="hero">
    <div>
      <h1>Stalzone serverlist</h1>
      <p class="subtitle">Актуальный список игровых адресов по регионам.</p>
    </div>

    <div class="actions">
      <button class="btn primary" id="refreshBtn" type="button">Проверить обновление</button>
      <button class="btn" id="exportJsonBtn" type="button">JSON</button>
      <button class="btn" id="exportCsvBtn" type="button">CSV</button>
    </div>
  </header>

  <section class="stats">
    <article class="stat">
      <small>Доступно регионов</small>
      <strong id="statAvailable">—</strong>
    </article>
    <article class="stat">
      <small>Всего регионов</small>
      <strong id="statRegions">—</strong>
    </article>
    <article class="stat">
      <small>Пулов</small>
      <strong id="statPools">—</strong>
    </article>
    <article class="stat">
      <small>Серверов</small>
      <strong id="statTunnels">—</strong>
    </article>
    <article class="stat">
      <small>IP с сетью</small>
      <strong id="statNetwork">—</strong>
    </article>
    <article class="stat">
      <small>Обновлено</small>
      <strong id="statUpdated">—</strong>
    </article>
  </section>

  <section class="controls">
    <input
      class="wide"
      id="search"
      type="search"
      autocomplete="off"
      placeholder="Поиск: сервер, IP, пул, ASN, оператор, город, страна…"
    >
    <select id="regionFilter">
      <option value="">Все регионы</option>
    </select>
    <select id="poolFilter">
      <option value="">Все пулы</option>
    </select>
    <button class="btn" id="copyVisibleBtn" type="button">Копировать IP</button>
  </section>

  <nav class="region-nav" id="regionNav" aria-label="Регионы"></nav>
  <main id="regions">
    <section class="panel empty">Загрузка данных…</section>
  </main>

  <section id="legacyServers" class="legacy-section" aria-label="Старые серверы"></section>

  <footer class="footer">
    Список обновляется автоматически. Город определяется приблизительно по данным IP-геолокации.
  </footer>
</div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite">Готово</div>
<script src="./app.js?v=6.2"></script>
</body>
</html>
