<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="Актуальный список серверов STALZONE по регионам">
  <title>STALZONE — Server Directory</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
<div class="container">
  <header class="hero">
    <div>
      <h1>STALZONE<br>Servers</h1>
      <p class="subtitle">Актуальный список игровых туннелей по регионам.</p>
    </div>

    <div class="actions">
      <button class="btn primary" id="refreshBtn" type="button">Проверить обновление</button>
      <button class="btn" id="whoisBtn" type="button">Загрузить IP-данные</button>
      <button class="btn" id="exportJsonBtn" type="button">JSON</button>
      <button class="btn" id="exportCsvBtn" type="button">CSV</button>
    </div>
  </header>

  <section class="stats">
    <article class="stat">
      <small>Endpoint’ов online</small>
      <strong id="statEndpoints">—</strong>
    </article>
    <article class="stat">
      <small>Регионов</small>
      <strong id="statRegions">—</strong>
    </article>
    <article class="stat">
      <small>Пулов</small>
      <strong id="statPools">—</strong>
    </article>
    <article class="stat">
      <small>Туннелей</small>
      <strong id="statTunnels">—</strong>
    </article>
    <article class="stat">
      <small>Уникальных IP</small>
      <strong id="statIps">—</strong>
    </article>
    <article class="stat">
      <small>Обновлено</small>
      <strong id="statUpdated">—</strong>
    </article>
  </section>

  <section class="endpoint-grid" id="endpointGrid"></section>

  <section class="controls">
    <input
      class="wide"
      id="search"
      type="search"
      autocomplete="off"
      placeholder="Поиск: сервер, IP, пул, ASN, оператор, город…"
    >
    <select id="regionFilter">
      <option value="">Все регионы</option>
    </select>
    <select id="poolFilter">
      <option value="">Все пулы</option>
    </select>
    <select id="endpointFilter">
      <option value="">Все endpoint’ы</option>
    </select>
    <button class="btn" id="copyVisibleBtn" type="button">Копировать IP</button>
  </section>

  <nav class="region-nav" id="regionNav" aria-label="Регионы"></nav>
  <main id="regions">
    <section class="panel empty">Загрузка данных…</section>
  </main>

  <footer class="footer">
    Источник — последние ответы региональных endpoint’ов, полученные GitHub Actions.
  </footer>
</div>

<div class="toast" id="toast" role="status" aria-live="polite">Готово</div>
<script src="./app.js"></script>
</body>
</html>
